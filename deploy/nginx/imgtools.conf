# ImgTools (Next.js) Nginx config
# Domain: yourdomain.tech + www.yourdomain.tech
# Proxies to Next.js running on 127.0.0.1:3000 (PM2)

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream nextjs_upstream {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name yourdomain.tech www.yourdomain.tech;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name yourdomain.tech www.yourdomain.tech;

  server_tokens off;

  client_max_body_size 52M;

  ssl_certificate     /etc/letsencrypt/live/yourdomain.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yourdomain.tech/privkey.pem;

  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/html
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  location ^~ /_next/static/ {
    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
  }

  location / {
    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
